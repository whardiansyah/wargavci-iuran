<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="100%">
  <defs>
    <!-- Palet Warna Rebranding dari Logo Lama (Dibuat Lebih Ramah UI Aplikasi) -->
    <linearGradient id="uiBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="uiGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="uiOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="uiYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND TRANSPARAN UNTUK DASHBOARD UI -->
  <rect width="100%" height="100%" fill="none"/>

  <g transform="translate(10, 0)">
    <!-- IKON REBRANDING: Gabungan Kotak Data Modular & Siluet Rumah -->
    <g id="app-data-icon">
      <!-- Blok Atas (Hijau - Lingkungan/Warga) -->
      <rect x="55" y="25" width="32" height="32" rx="6" fill="url(#uiGreen)" />
      
      <!-- Blok Kiri (Oranye - Kependudukan) -->
      <rect x="20" y="60" width="32" height="32" rx="6" fill="url(#uiOrange)" />
      
      <!-- Blok Tengah Utama (Biru - Pusat Data) -->
      <rect x="55" y="60" width="32" height="32" rx="6" fill="url(#uiBlue)" />
      
      <!-- Blok Bawah (Kuning - Administrasi/Iuran) -->
      <rect x="55" y="95" width="32" height="32" rx="6" fill="url(#uiYellow)" />
      
      <!-- Garis Node Koneksi Data Tipis (Menandakan Sistem Terintegrasi) -->
      <path d="M36,60 L36,41 L55,41" stroke="#e2e8f0" stroke-width="2" fill="none" opacity="0.3"/>
      <path d="M71,57 L71,25" stroke="#e2e8f0" stroke-width="2" fill="none" opacity="0.3"/>
    </g>

    <!-- TEKS IDENTITAS SISTEM APLIKASI -->
    <g id="app-text" transform="translate(110, 0)">
      <!-- VILLA CILAME INDAH -->
      <text x="0" y="62" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#1e293b" letter-spacing="1">
        VILLA CILAME INDAH
      </text>
      
      <!-- NAMA SISTEM / SUB-TEXT -->
      <text x="0" y="92" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="4">
        SISTEM INFORMASI DATA WARGA
      </text>
      
      <!-- Badge Status Aplikasi Aktif (Aksen UI Modern) -->
      <rect x="0" y="105" width="55" height="18" rx="4" fill="#dcfce7"/>
      <text x="27.5" y="118" font-family="'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#15803d" text-anchor="middle">ONLINE</text>
    </g>
  </g>
</svg>
